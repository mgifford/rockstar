name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        working-directory: ./brickstar-legends

      - name: Build
        run: npm run build
        working-directory: ./brickstar-legends

      - name: Prepare Deployment Directory
        run: |
          mkdir staging
          # 1. Copy ALL existing files from the root (your old site)
          # We exclude the staging and brickstar-legends source folders
          rsync -av . staging/ --exclude staging --exclude brickstar-legends --exclude .git --exclude .github
          
          # 2. Create the subdirectory for the new app
          mkdir -p staging/brickstar-legends
          
          # 3. Copy the COMPILED React app into that subdirectory
          cp -r ./brickstar-legends/dist/* staging/brickstar-legends/
          
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Point to the combined staging folder
          path: './staging'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
